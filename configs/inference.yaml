# Stable Diffusion 推理配置

# 基本配置
seed: 42
device: 'cuda'
image_size: [256, 256]

# 数据配置
data:
  dataset: 'kitti360'
  data_dir: '/mnt/shizhm/KITTI-360'
  batch_size: 1
  num_workers: 4
  mode: 'front'
  front_resize: [640, 256]
  pitch_deg: 0.0
  roll_deg: 0.0
  sat_size: 512
  resolution: 0.2

# 模型配置
model:
  base_model: 'sd2-community/stable-diffusion-2-1-base'
  checkpoint_path: './checkpoints/last.ckpt'

  # 卫星图编码器配置
  satellite_encoder:
    name: 'satellite_condition_encoder'
    embed_dim: 768
    patch_size: 16
    sat_resolution: 0.2
    sat_size: 512

  # Perspective position encoding for satellite tokens
  perspective_position_encoding:
    enable: true

# 推理配置
inference:
  # 去噪步数
  num_inference_steps: 50
  # 指导强度
  guidance_scale: 7.5
  # 采样器
  sampler: 'euler_a'  # euler, euler_a, dpm_solver++
  # 批处理大小
  batch_size: 1

# 保存配置
output:
  output_dir: './results'
  save_images: true
  save_metrics: true

# 验证配置
validation:
  compute_metrics: true
  metrics: ['psnr', 'ssim', 'lpips']

# 可视化配置
visualization:
  save_comparison: true
  comparison_layout: 'horizontal'  # horizontal, vertical
  max_visualization_samples: 50
