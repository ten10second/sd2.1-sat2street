# Stable Diffusion inference config.
#
# scripts/infer.py reads this file for defaults. CLI flags still override these
# values, so experiment-specific paths can stay on the command line.

seed: 42
device: 'cuda'
mixed_precision: 'no'
hf_endpoint: 'https://hf-mirror.com'
hf_home: '.hf-home'

data:
  data_dir: '/media/shizhm/Lenovo/KITTI-360'
  split_yaml: 'splits/sync03_sync04_split.yaml'
  dataset_split: 'val'
  front_resize: [640, 256]
  virtual_size: [640, 256]
  # Optional selectors:
  # drive: null
  # drive_dir: null
  # frame_id: null
  # start_frame: null
  # end_frame: null
  # max_frames: null

model:
  base_model: 'sd2-community/stable-diffusion-2-1-base'
  checkpoint_path: 'output/sat2street_single_gpu/checkpoints/checkpoint_epoch_100.pt'
  base_model_revision: null

  satellite_encoder:
    name: 'satellite_condition_encoder'
    embed_dim: 768
    patch_size: 16
    xy_feature_source: 'resnet'
    resnet_name: 'resnet34'
    resnet_stage: 'layer3'
    resnet_pretrained: false
    num_layers: 0
    num_heads: 12
    use_relative_pos: true

  reading_block:
    enable: true
    sat_in_dim: 768
    view_grid_h: 8
    view_grid_w: 20
    view_query_dim: 768
    view_num_heads: 8
    view_scale: 0.4
    view_geo_bias_weight: 1.0
    view_geo_sigma: 0.35
    view_local_topk: 25
    view_geo_target_sigma: 0.20
    view_geo_loss_weight: 0.01
    view_gate_hidden_dim: 256
    token_pool_num_tokens: 8
    token_pool_num_heads: 8
    token_scale: 1.0
    scene_consistency_weight: 0.01
    save_attention_heatmap: false
    heatmap_max_tokens: 16
    ray_num_samples: 32
    ray_depth_min: 1.0
    ray_depth_max: 80.0
    ray_offset_scale: 0.50
    ray_scene_extent_x_m: 51.2
    ray_scene_extent_y_m: 51.2
    ray_scene_z_min_m: 0.0
    ray_scene_z_max_m: 20.0
    triplane_enabled: true
    triplane_height_tokens: 16
    triplane_num_cvha_layers: 1
    triplane_cvha_num_self_points: 4
    triplane_cvha_num_cross_points: 8
    triplane_cvha_local_radius: 1.0
    triplane_cvha_offset_scale: 1.0
    view_injection_sites: [down2, down3, mid, up0, up1]
    view_modulation_scale: 0.4

inference:
  mode: 'single_yaw_sweep'
  include_front: true
  # Cover the trained fixed yaw anchors plus denser test angles.
  vehicle_yaws: [-120.0, -90.0, -60.0, -40.0, 40.0, 60.0, 90.0, 120.0]
  fixed_yaws: [-120.0, -90.0, -60.0, -40.0, 40.0, 60.0, 90.0, 120.0]
  num_inference_steps: 30
  guidance_scale: 3.0
  sat_condition_mode: 'normal'
  # ablation_modes: ['normal', 'sat_zero']

output:
  output_dir: 'output/inference_epoch100_aligned'
