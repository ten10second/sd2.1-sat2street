# Stable Diffusion 训练配置

# 基本配置
seed: 42
device: 'cuda'
mixed_precision: 'fp16'
gradient_checkpointing: true

# 数据配置
data:
  dataset: 'kitti360'
  data_dir: '/media/zhimiao/Lenovo/KITTI-360'
  batch_size: 2
  num_workers: 8
  image_size: [256, 256]
  sat_size: 512
  resolution: 0.2
  mode: 'fisheye_virtual'
  yaw_mode: 'vehicle_relative'
  view_set: 'grouped_front_fixed_yaw5'
  front_resize: [640, 256]

# 模型配置
model:
  # Stable Diffusion 基础模型
  base_model: 'stabilityai/stable-diffusion-2-1'
  # 是否冻结基础层
  freeze_base: true

  # 卫星图编码器配置
  satellite_encoder:
    name: 'satellite_condition_encoder'
    embed_dim: 768
    patch_size: 16
    # ResNet layer3 gives a 32x32 XY feature map for 512x512 satellite images.
    xy_feature_source: 'resnet'  # resnet, patch
    resnet_name: 'resnet34'
    resnet_stage: 'layer3'
    resnet_pretrained: false
    # Optional XY-plane relative-attention refinement before triplane/CVHA.
    num_layers: 0
    num_heads: 12
    use_relative_pos: true

  # 坐标位置编码配置
  coordinate_encoder:
    name: 'relative_coordinate_encoder'
    encode_type: 'fourier'  # fourier, sincos, linear
    embed_dim: 256
    fourier_scale: 10.0
    num_frequencies: 10

  # Self-Attention 配置
  self_attention:
    name: 'relative_position_attention'
    embed_dim: 768
    num_heads: 12
    dropout: 0.1
    use_relative_pos: true

  # Native attn2 conditioning tokens: global scene + view-aware satellite tokens
  reading_block:
    enable: true
    sat_in_dim: 768
    view_grid_h: 8
    view_grid_w: 20
    view_query_dim: 768
    view_num_heads: 8
    view_scale: 0.4
    view_geo_bias_weight: 1.0
    view_geo_sigma: 0.35
    view_local_topk: 25
    view_geo_target_sigma: 0.20
    view_geo_loss_weight: 0.01
    view_gate_hidden_dim: 256
    token_pool_num_tokens: 8
    token_pool_num_heads: 8
    token_scale: 1.0
    scene_consistency_weight: 0.01
    save_attention_heatmap: false
    heatmap_max_tokens: 16
    ray_num_samples: 32
    ray_depth_min: 1.0
    ray_depth_max: 80.0
    ray_offset_scale: 0.50  # meters
    ray_scene_extent_x_m: 51.2
    ray_scene_extent_y_m: 51.2
    ray_scene_z_min_m: 0.0
    ray_scene_z_max_m: 20.0
    triplane_enabled: true
    triplane_height_tokens: 16
    triplane_num_cvha_layers: 1
    triplane_cvha_num_self_points: 4
    triplane_cvha_num_cross_points: 8
    triplane_cvha_local_radius: 1.0
    triplane_cvha_offset_scale: 1.0
    view_injection_sites: [down2, down3, mid, up0, up1]
    view_modulation_scale: 0.4

# 训练配置
training:
  epochs: 100
  warmup_epochs: 5
  learning_rate: 1e-4
  weight_decay: 1e-4
  scheduler: 'cosine'
  gradient_accumulation_steps: 4
  gradient_clip_val: 1.0

  # Loss 配置
  loss:
    # 原始 SD loss 权重
    lambda_recon: 1.0
    # 感知 loss 权重
    lambda_perceptual: 0.01

# 保存配置
checkpoint:
  save_dir: './checkpoints'
  save_every: 50
  max_checkpoints: 5
  resume_from: null

# 日志配置
logging:
  log_dir: './logs'
  log_every: 100
  use_wandb: true
  project_name: 'kitti360_sd'

# 验证配置
validation:
  validate_every: 5
  num_validation_samples: 100
