# Stable Diffusion 训练配置

# 基本配置
seed: 42
device: 'cuda'
mixed_precision: 'bf16'
gradient_checkpointing: false
attention_slicing: false
output_dir: './output/wip_pitch_roll_conditioning_sync05_geometry_score'

# 数据配置
data:
  dataset: 'kitti360'
  data_dir: '/mnt/shizhm/KITTI-360'
  batch_size: 8
  num_workers: 8
  image_size: [256, 256]
  sat_size: 512
  resolution: 0.2
  mode: 'fisheye_virtual'
  yaw_mode: 'vehicle_relative'
  view_set: 'single'
  vehicle_yaw_min_deg: 60.0
  vehicle_yaw_max_deg: 120.0
  vehicle_yaw_sampling: 'fixed_list'
  vehicle_yaw_fixed_list: ['front', -120.0, -90.0, -60.0, 60.0, 90.0, 120.0]
  front_sample_prob: 0.0
  pitch_deg: 0.0
  roll_deg: 0.0
  front_resize: [640, 256]

# 模型配置
model:
  # Stable Diffusion 基础模型
  base_model: 'sd2-community/stable-diffusion-2-1-base'
  # 是否冻结基础层
  freeze_base: true

  # 卫星图编码器配置
  satellite_encoder:
    name: 'satellite_condition_encoder'
    embed_dim: 1024
    patch_size: 16
    sat_resolution: 0.2
    sat_size: 512
    num_heads: 8

  # Geometry-first semantic-refine addressing. Projected geometry owns global
  # candidate selection; semantic scores only refine within that local window.
  query_geometry_score:
    enable: true
    mode: 'geometry_first_semantic_refine'
    dim: 64
    num_freqs: 6
    gate_init: 2.0
    layers: null
    max_query_tokens: null
    candidate_radius: 0.35
    candidate_min_k: 16
    candidate_invalid_penalty: -10000.0
    semantic_score_dim: 64
    semantic_alpha_max: 0.25

# 训练配置
training:
  epochs: 100
  warmup_epochs: 5
  learning_rate: 1e-5
  weight_decay: 1e-4
  scheduler: 'cosine'
  gradient_accumulation_steps: 2
  gradient_clip_val: 0.5

  # Give the pure geometry-addressing path enough logit scale and learning
  # speed to compete with content QK, while ramping the effective gate in.
  geometry_score:
    lr_multiplier: 2.0
    gate_warmup_steps: 500
    gate_warmup_start_scale: 0.25
    gate_warmup_end_scale: 1.0
    semantic_alpha_hold_steps: 1000
    semantic_alpha_warmup_steps: 2000

  # Loss 配置
  loss:
    # 原始 SD loss 权重
    lambda_recon: 1.0
    # 感知 loss 权重
    lambda_perceptual: 0.01

  # Cross-attention alignment supervision for query UV -> satellite patch matching.
  # This keeps the geometry signal soft, but gives PE a direct training path
  # instead of hoping the denoising objective discovers the correspondence.
  attention_alignment:
    enable: true
    loss_weight: 0.05
    layers: null
    max_query_tokens: 1024
    valid_radius: 0.25
    invalid_attention_weight: 0.1

# 保存配置
checkpoint:
  save_dir: './output/wip_pitch_roll_conditioning_sync05_geometry_score/checkpoints'
  save_every: 20
  max_checkpoints: 5
  resume_from: null

# 日志配置
logging:
  log_dir: './output/wip_pitch_roll_conditioning_sync05_geometry_score/logs'
  log_every: 100
  use_wandb: true
  project_name: 'kitti360_sd'
  tensorboard_log_dir: './output/wip_pitch_roll_conditioning_sync03_geometry_score/tensorboard'

# 验证配置
validation:
  validate_every: 10
  num_validation_samples: 4
