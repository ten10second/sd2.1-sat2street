# Stage 1 yaw-only finetune with query geometry bias enabled.
# Starts from the 20-epoch yaw checkpoint and resets optimizer/scheduler.

seed: 42
device: 'cuda'
mixed_precision: 'bf16'
gradient_checkpointing: true
output_dir: './output/stage1_yaw_sync03_geombias_ft'

data:
  dataset: 'kitti360'
  data_dir: '/media/shizhm/Lenovo/KITTI-360'
  batch_size: 2
  num_workers: 8
  image_size: [256, 256]
  sat_size: 512
  resolution: 0.2
  mode: 'fisheye_virtual'
  yaw_mode: 'vehicle_relative'
  view_set: 'single'
  vehicle_yaw_min_deg: 60.0
  vehicle_yaw_max_deg: 120.0
  vehicle_yaw_sampling: 'fixed_list'
  vehicle_yaw_fixed_list: [-120.0, -90.0, -60.0, 60.0, 90.0, 120.0]
  front_sample_prob: 0.0
  pitch_deg: 0.0
  roll_deg: 0.0
  pitch_fixed_list: [0.0]
  roll_fixed_list: [0.0]
  front_resize: [640, 256]

model:
  base_model: 'sd2-community/stable-diffusion-2-1-base'
  freeze_base: true
  satellite_encoder:
    name: 'satellite_condition_encoder'
    embed_dim: 1024
    patch_size: 16
    sat_resolution: 0.2
    sat_size: 512
    num_heads: 8
    perspective_num_freqs: 6
    perspective_pe_gate_init: 0.1
  perspective_position_encoding:
    enable: true
  query_position_encoding:
    enable: false
    gate_init: 1.0
  query_geometry_bias:
    enable: true
    distance_scale: 2.0
    invalid_penalty: -10000.0
  pose_time_conditioning:
    enable: true
    dim: 128
    gate_init: 0.1

training:
  epochs: 20
  warmup_epochs: 1
  learning_rate: 1e-5
  weight_decay: 1e-4
  scheduler: 'cosine'
  gradient_accumulation_steps: 4
  gradient_clip_val: 0.5
  cond_drop_prob: 0.0

checkpoint:
  save_dir: './output/stage1_yaw_sync03_geombias_ft/checkpoints'
  save_every: 20
  max_checkpoints: 3
  resume_from: null
  init_checkpoint: './output/stage1_yaw_sync03/checkpoints/checkpoint_epoch_20.pt'

logging:
  log_dir: './output/stage1_yaw_sync03_geombias_ft/logs'
  log_every: 50
  use_wandb: false
  use_tensorboard: true
  tensorboard_log_dir: './output/stage1_yaw_sync03_geombias_ft/tensorboard'
  project_name: 'kitti360_sd'
  run_name: 'stage1_yaw_sync03_geombias_ft'
  wandb_mode: 'offline'

validation:
  validate_every: 1
  visualize_every: 1
  num_validation_samples: 1
  visualization_inference_steps: 20
  visualization_seed: 42
  guidance_scale: 1.0
